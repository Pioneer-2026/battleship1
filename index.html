 <body data-template-id="__page-root" class="min-h-screen flex items-center justify-center p-4">
  <main class="w-full max-w-4xl mx-auto text-center"><!-- Name Entry -->

     </div>
     <div><label data-template-id="p2-label" class="canva-text block mb-1 font-medium" for="p2-name"></label> <input id="p2-name" type="text" class="px-3 py-2 rounded bg-slate-800 border border-slate-600 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500" maxlength="12">
     </div>
    </div><button data-template-id="start-btn" class="canva-button px-6 py-3 rounded-lg font-bold text-lg" onclick="startGame()"></button>

   <div id="placement-screen" class="hidden">

    <div class="flex justify-center mb-4 gap-3"><button id="rotate-btn" class="px-4 py-2 bg-cyan-700 hover:bg-cyan-600 text-white rounded font-medium" onclick="toggleRotation()">Rotate</button> <button id="confirm-ships-btn" class="px-4 py-2 bg-green-700 hover:bg-green-600 text-white rounded font-medium hidden" onclick="confirmPlacement()">Confirm</button>

  <script src="/_sdk/e063511df281944a.editing_sdk.js" integrity="sha512-Xa8p4aPfoMxVnzxQE2WAG0FfoaPLxdjOJMfUZGm1yZosJTYmnNDvgLkJ2EoN0i3zxjeQVAzUMSXNvTKQVqbXyQ=="></script>
  <script>
    const SHIPS = [5,4,3,3,2];
    let players = [{name:'',board:[],shots:[]},{name:'',board:[],shots:[]}];
    let currentPlayer = 0;
    let phase = 'names'; // names, placing, handoff, battle, won
    let placingIndex = 0;
    let horizontal = true;
    let placedShips = [];

    function createEmptyBoard() { return Array.from({length:10}, ()=>Array(10).fill(0)); }

    function startGame() {
        const n1 = document.getElementById('p1-name').value.trim() || 'Player 1';
        const n2 = document.getElementById('p2-name').value.trim() || 'Player 2';
        players[0].name = n1; players[1].name = n2;
        players[0].board = createEmptyBoard(); players[1].board = createEmptyBoard();
        players[0].shots = createEmptyBoard(); players[1].shots = createEmptyBoard();
        currentPlayer = 0; placingIndex = 0; placedShips = []; horizontal = true;
        document.getElementById('name-screen').classList.add('hidden');
        startPlacement();
    }

    function startPlacement() {
        phase = 'placing';
        placingIndex = 0; placedShips = []; horizontal = true;
        const s = document.getElementById('placement-screen');
        s.classList.remove('hidden');
        document.getElementById('placement-title').textContent = players[currentPlayer].name + ' — Place Your Ships';
        updatePlacementInfo();
        document.getElementById('confirm-ships-btn').classList.add('hidden');
        renderPlacementGrid();
    }

    function updatePlacementInfo() {
        if (placingIndex < SHIPS.length) {
            document.getElementById('placement-info').textContent = 'Place ship of size ' + SHIPS[placingIndex] + ' (' + (horizontal?'horizontal':'vertical') + ')';
        } else {
            document.getElementById('placement-info').textContent = 'All ships placed!';
            document.getElementById('confirm-ships-btn').classList.remove('hidden');
        }
    }

    function toggleRotation() { horizontal = !horizontal; updatePlacementInfo(); }

    function renderPlacementGrid() {
        const g = document.getElementById('placement-grid'); g.innerHTML = '';
        const board = players[currentPlayer].board;
        for (let r=0;r<10;r++) for (let c=0;c<10;c++) {
            const cell = document.createElement('div');
            cell.className = 'cell ' + (board[r][c] ? 'ship' : 'water');
            cell.dataset.r = r; cell.dataset.c = c;
            cell.addEventListener('click', ()=>placeShip(r,c));
            cell.addEventListener('mouseenter', ()=>previewShip(r,c));
            cell.addEventListener('mouseleave', clearPreview);
            g.appendChild(cell);
        }
    }

    function canPlace(board,r,c,size,horiz) {
        for (let i=0;i<size;i++) {
            const nr=horiz?r:r+i, nc=horiz?c+i:c;
            if (nr>=10||nc>=10||board[nr][nc]) return false;
        } return true;
    }

    function previewShip(r,c) {
        if (placingIndex>=SHIPS.length) return;
        const size=SHIPS[placingIndex]; const valid=canPlace(players[currentPlayer].board,r,c,size,horizontal);
        for (let i=0;i<size;i++) {
            const nr=horizontal?r:r+i, nc=horizontal?c+i:c;
            if (nr>=10||nc>=10) continue;
            const cell=document.getElementById('placement-grid').children[nr*10+nc];
            if (!players[currentPlayer].board[nr][nc]) cell.classList.add(valid?'preview':'preview-invalid');
        }
    }

    function clearPreview() {
        document.querySelectorAll('#placement-grid .preview, #placement-grid .preview-invalid').forEach(c=>{c.classList.remove('preview','preview-invalid');});
    }

    function placeShip(r,c) {
        if (placingIndex>=SHIPS.length) return;
        const size=SHIPS[placingIndex]; const board=players[currentPlayer].board;
        if (!canPlace(board,r,c,size,horizontal)) return;
        for (let i=0;i<size;i++) { const nr=horizontal?r:r+i, nc=horizontal?c+i:c; board[nr][nc]=1; }
        placingIndex++; updatePlacementInfo(); renderPlacementGrid();
    }

    function confirmPlacement() {
        document.getElementById('placement-screen').classList.add('hidden');
        if (currentPlayer===0) {
            currentPlayer=1;
            document.getElementById('handoff-screen').classList.remove('hidden');
            document.getElementById('handoff-text').textContent = 'Pass to ' + players[1].name;
            phase='handoff';
        } else {
            currentPlayer=0; startBattle();
        }
    }

    function proceedAfterHandoff() {
        document.getElementById('handoff-screen').classList.add('hidden');
        startPlacement();
    }

    function startBattle() {
        phase='battle'; currentPlayer=0;
        document.getElementById('battle-screen').classList.remove('hidden');
        renderBattle();
    }

    function renderBattle() {
        const opponent = 1-currentPlayer;
        document.getElementById('turn-indicator').textContent = players[currentPlayer].name + "'s Turn";
        // Attack grid (opponent's board, fog of war)
        const ag = document.getElementById('attack-grid'); ag.innerHTML='';
        for (let r=0;r<10;r++) for (let c=0;c<10;c++) {
            const cell=document.createElement('div');
            const shot=players[currentPlayer].shots[r][c];
            cell.className='cell '+(shot===2?'hit':shot===1?'miss':'water');
            if (!shot) cell.addEventListener('click',()=>fire(r,c));
            ag.appendChild(cell);
        }
        // Own grid
        const og = document.getElementById('own-grid'); og.innerHTML='';
        const myBoard=players[currentPlayer].board; const theirShots=players[opponent].shots;
        for (let r=0;r<10;r++) for (let c=0;c<10;c++) {
            const cell=document.createElement('div');
            const s=theirShots[r][c];
            cell.className='cell '+(s===2?'hit':s===1?'miss':myBoard[r][c]?'ship':'water');
            og.appendChild(cell);
        }
    }

    function fire(r,c) {
        if (phase!=='battle') return;
        const opponent=1-currentPlayer;
        const hit = players[opponent].board[r][c]===1;
        players[currentPlayer].shots[r][c] = hit?2:1;
        document.getElementById('battle-status').textContent = hit?'Hit!':'Miss.';
        if (checkWin(currentPlayer)) {
            phase='won';
            document.getElementById('battle-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            document.getElementById('win-text').textContent = players[currentPlayer].name + ' Wins!';
            return;
        }
        if (!hit) { currentPlayer=1-currentPlayer; }
        setTimeout(()=>{ document.getElementById('battle-status').textContent=''; renderBattle(); }, 800);
    }

    function checkWin(p) {
        const opp=1-p; const board=players[opp].board; const shots=players[p].shots;
        for (let r=0;r<10;r++) for (let c=0;c<10;c++) if (board[r][c]&&shots[r][c]!==2) return false;
        return true;
    }
